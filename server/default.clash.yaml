# =============================================================================
#  Apex 推荐 Clash 配置模板  (适用于 v2board / Xboard 面板)
# =============================================================================
#  本模板**只修改 DNS 段**，其余字段全部沿用面板出厂默认结构，确保 mihomo
#  各版本都能成功加载。激进特性（sniffer / geo-auto-update /
#  nameserver-policy 高级语法 / 生僻 geosite 分类）一律删掉避免解析失败。
#
#  ★ v2board ★（模板存文件系统）
#    cp /www/wwwroot/v2board/resources/rules/default.clash.yaml{,.bak}
#    wget https://raw.githubusercontent.com/dreamrer/mihomo-build2/main/server/default.clash.yaml \
#         -O /www/wwwroot/v2board/resources/rules/default.clash.yaml
#    立即生效（无缓存）。
#
#  ★ Xboard ★（模板存数据库，文件不读）
#    Xboard 后台 → 订阅设置 → 「clashmeta 模板」字段，把本文件内容整段粘进去保存。
#    缓存 1 小时；要立即生效进 SSH 跑：
#      redis-cli del 'subscribe_template:clashmeta'
#
#  $app_name 占位符会被服务端替换为面板的应用名（保留即可，不要硬编码）
# =============================================================================

mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false

# ============================== DNS（唯一关键改动）==============================
# 全部用 DoH/DoT，避免：
#   - 国内 ISP 透明 DNS 劫持剥离 SVCB 记录（导致 ECH 节点拉不起来）
#   - UDP-53 包大小截断（HTTPS/SVCB 记录通常 > 512 字节）
#   - GFW 对境外域名 SVCB 查询的污染
#   - 老模板 fallback 用明文境外 DNS（1.1.1.1 / 8.8.8.8）在国内 ISP 拦截下根本不通
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true

  # default-nameserver 解析下面 DoH/DoT 的域名，必须明文 IP 否则鸡生蛋
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 主 DNS：境内 DoH，对国内域名友好且支持 SVCB（ECH 必需）
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # 兜底：境外 DoH/DoT，加密通道国内 ISP 拦不住
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4

  # 节点服务器域名解析专用 —— 防止节点 host 被 fakeip 化导致连不上
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.localdomain"
    - "+.push.apple.com"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "localhost.ptlogin2.qq.com"
    - "+.pool.ntp.org"

# ============================== 节点（由服务端注入）==============================
proxies:

# ============================== 代理组 ==============================
# $app_name 会被服务端替换为面板的应用名
proxy-groups:
  - { name: $app_name, type: select, proxies: ["自动选择", "故障转移"] }
  - { name: 自动选择, type: url-test, proxies: [], url: "http://www.gstatic.com/generate_204", interval: 300, tolerance: 50 }
  - { name: 故障转移, type: fallback, proxies: [], url: "http://www.gstatic.com/generate_204", interval: 300 }

# ============================== 规则 ==============================
# 简化版 —— 用 geosite/geoip 分类代替几百行手写域名。
# mihomo 自带这些分类（geosite.dat / geoip.metadb），无需额外下载配置。
rules:
  # 局域网直连
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve

  # 国内域名直连
  - GEOSITE,cn,DIRECT
  - GEOSITE,private,DIRECT

  # 国外域名走代理
  - GEOSITE,geolocation-!cn,$app_name

  # IP 兜底
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,cn,DIRECT
  - MATCH,$app_name
